type Query {
  messages: [Message!]!
  getUsers: [User!]!
  senders:[Sender!]! #3 assignment
  chats:[Chat!]!   #3 assignment
  getUserById(id: ID!): User
  getPosts: [Post!]!
  getPostById(id: ID!): Post
  getPostsByUserId(userId: ID!): [Post!]!
  getComments: [Comment!]!
  getCommentsByPostId(postId: ID!): [Comment!]!
  getUserByComment(comment: CommentInput!): User
  getAuthorOfPost(post: PostInput!): User
   getUser(id: ID!): UserResult
  getPost(id: ID!): PostResult
  getComment(id: ID!): CommentResult
   paginatedPosts(page: Int!, limit: Int!,sortBy:String,order:String): PaginatedPosts
   chatHistory:[Chat!]! #3 assignment
   #4 assignment

}
type authPayload {
  user: Sender!
  token: String!
}

type Mutation {
    postMessage(content: String!, author: String!, title: String!): Message!
    createPost(title: String!, content: String!, authorId: ID!): Post!
    createComment(content: String!, authorId: ID!, postId: ID!): Comment!
    updateUser(id:ID!,name:String!):User
    deleteComment(id:ID!):Comment
    login(email:String! , password:String!): authPayload!
    sendMessage(text:String!,userId:ID):Chat!
      logout: Boolean!   # new mutation
      # 4 assignment
      register(name:String!,email:String!, role:String!, password:String!):Sender!
      deleteUser(id: ID!, ID2:ID!): Sender!


}


type Subscription {
  messagePosted: Message!
  commentPosted: Comment!
  userPresenceChanged: UserPresence!

  # structured payload
  messageAdded: Chat! 
}
input CommentInput {
  id: ID!
  content: String!
  postId: ID!
  userId: ID!
}

input PostInput {
  id: ID!
  title: String!
  content: String!
  authorId: ID!
}
