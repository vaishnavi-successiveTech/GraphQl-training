type User {
  id: ID!
  name: String!
  email:String!
  posts: [Post!]!
  comments: [Comment!]!
}

# Post type
type Post {
  id: ID!
  title: String!
  content: String!
  author: User!
  comments: [Comment!]!
}
# Comment type
type Comment {
  id: ID!
  text: String!
  post: Post!
  user: User!
}
type PaginatedPosts {
  posts: [Post!]!
  totalPosts: Int!
  totalPages: Int!
  currentPage: Int!
}
# ERROR
type Error {
  code: String!
  message: String!
}

union UserResult = User | Error
union PostResult = Post | Error
union CommentResult = Comment | Error

























