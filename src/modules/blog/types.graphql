type User {
  id: ID!
  name: String!
  posts: [Post!]!
  comments: [Comment!]!
}

# Post type
type Post {
  id: ID!
  title: String!
  content: String!
  author: User!
  comments: [Comment!]!
}

# Comment type
type Comment {
  id: ID!
   text: String!
  post: Post!
  user: User!
}
























